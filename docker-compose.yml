services:
    laravel.test:
        build:
            context: .
            dockerfile: Dockerfile
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-8000}:8000'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER:-1000}'
            LARAVEL_SAIL: 1
        working_dir: /var/www/html
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - pgsql

    pgsql:
        image: 'postgres:17-alpine'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            POSTGRES_DB: '${DB_DATABASE:-gestion_licitaciones}'
            POSTGRES_USER: '${DB_USERNAME:-sail}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-password}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD-SHELL
                - 'pg_isready -U "${DB_USERNAME:-sail}" -d "${DB_DATABASE:-gestion_licitaciones}"'
            retries: 3
            timeout: 5s
    frontend:
        image: node:20
        working_dir: /app
        volumes:
            - '.:/app'
            - 'frontend_node_modules:/app/node_modules'
        ports:
            - '5173:5173'
        command: sh -c "npm ci && npm run dev"
        environment:
            CHOKIDAR_USEPOLLING: 'true'
        networks:
            - sail
networks:
    sail:
        driver: bridge
volumes:
    sail-pgsql:
        driver: local
    frontend_node_modules:
        driver: local
